<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QuoteGen Pro | SaaS 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #4f46e5;
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        [data-theme='dark'] {
            --bg-gradient: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            --card-bg: rgba(15, 23, 42, 0.9); 
            --text-primary: #ffffff; 
            --text-secondary: #94a3b8;
            --accent: #818cf8;
            --glass-border: rgba(255, 255, 255, 0.12);
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            transition: background 0.4s ease, color 0.4s ease;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
        }

        .app-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 4rem 2.5rem;
            width: 90%;
            max-width: 550px;
            box-shadow: var(--shadow);
            position: relative;
            text-align: center;
        }

        .theme-toggle {
            position: absolute;
            top: 24px;
            right: 24px;
            background: var(--glass-border);
            border: 1px solid var(--glass-border);
            width: 44px;
            height: 44px;
            border-radius: 14px;
            cursor: pointer;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            background: var(--accent);
            color: white;
        }

        .quote-header {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--accent);
            font-weight: 800;
            margin-bottom: 2rem;
        }

        #quote-text {
            font-size: 1.85rem;
            font-weight: 700;
            line-height: 1.35;
            margin-bottom: 2.5rem;
            letter-spacing: -0.02em;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 10px 20px -10px var(--accent);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--glass-border);
        }

        .fade-in {
            animation: quoteSlide 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes quoteSlide {
            from { opacity: 0; transform: translateY(20px); filter: blur(8px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
    </style>
</head>
<body data-theme="dark">

    <div class="app-container">
        <button class="theme-toggle" id="theme-btn" title="Toggle Appearance">
            <span id="theme-icon">🌙</span>
        </button>

        <div class="quote-header">Instant Insight</div>
        
        <div id="quote-box" class="fade-in">
            <h1 id="quote-text">"Click below to start your journey."</h1>
        </div>

        <div class="button-group">
            <button class="btn btn-primary" id="next-btn">Next Quote</button>
            <button class="btn btn-secondary" id="copy-btn">Copy</button>
        </div>
    </div>

    <script type="module">
        import quotes from './quotes.js';

        const themeBtn = document.getElementById('theme-btn');
        const themeIcon = document.getElementById('theme-icon');
        const nextBtn = document.getElementById('next-btn');
        const copyBtn = document.getElementById('copy-btn');
        const body = document.body;

        // Theme Logic
        themeBtn.addEventListener('click', () => {
            const isDark = body.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            themeIcon.innerText = newTheme === 'dark' ? '🌙' : '☀️';
        });

        // Quote Logic
        function generateQuote() {
            const quoteBox = document.getElementById('quote-box');
            const textElem = document.getElementById('quote-text');
            
            quoteBox.classList.remove('fade-in');
            void quoteBox.offsetWidth; 
            quoteBox.classList.add('fade-in');

            const randomIndex = Math.floor(Math.random() * quotes.length);
            textElem.innerText = `"${quotes[randomIndex]}"`;
        }

        // Copy Logic
        function copyQuote() {
            const text = document.getElementById('quote-text').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "Copied!";
                setTimeout(() => { copyBtn.innerText = "Copy"; }, 1500);
            });
        }

        // Attach listeners to buttons
        nextBtn.addEventListener('click', generateQuote);
        copyBtn.addEventListener('click', copyQuote);

        // Initial Load
        generateQuote();
    </script>
</body>
</html>
