<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QuoteGen Pro | SaaS 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Light Mode - Ultra Clean */
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #4f46e5;
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        [data-theme='dark'] {
            /* 2026 High-Contrast Dark Mode */
            --bg-gradient: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            --card-bg: rgba(15, 23, 42, 0.9); 
            --text-primary: #ffffff; /* Pure white for visibility */
            --text-secondary: #94a3b8;
            --accent: #818cf8;
            --glass-border: rgba(255, 255, 255, 0.12);
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            transition: background 0.4s ease, color 0.4s ease;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
        }

        /* SaaS Bento-Style Container */
        .app-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 4rem 2rem;
            width: 90%;
            max-width: 550px;
            box-shadow: var(--shadow);
            position: relative;
            text-align: center;
        }

        /* Dynamic Theme Toggle */
        .theme-toggle {
            position: absolute;
            top: 24px;
            right: 24px;
            background: var(--glass-border);
            border: 1px solid var(--glass-border);
            width: 44px;
            height: 44px;
            border-radius: 14px;
            cursor: pointer;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(5deg);
            background: var(--accent);
            color: white;
        }

        .quote-header {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--accent);
            font-weight: 800;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        #quote-text {
            font-size: 1.85rem;
            font-weight: 700;
            line-height: 1.35;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        #quote-author {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 400;
            display: block;
            margin-bottom: 3rem;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 10px 20px -10px var(--accent);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 15px 25px -10px var(--accent);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--glass-border);
        }

        /* Premium Smooth Animation */
        .fade-in {
            animation: quoteSlide 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes quoteSlide {
            from { opacity: 0; transform: translateY(20px); filter: blur(8px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @media (max-width: 480px) {
            .app-container { padding: 3rem 1.5rem; }
            #quote-text { font-size: 1.5rem; }
        }
    </style>
</head>
<body data-theme="dark">

    <div class="app-container">
        <button class="theme-toggle" id="theme-btn" title="Toggle Appearance">
            <span id="theme-icon">🌙</span>
        </button>

        <div class="quote-header">Curated Inspiration</div>
        
        <div id="quote-box" class="fade-in">
            <h1 id="quote-text">"The future belongs to those who build it."</h1>
            <span id="quote-author">SaaS Generator</span>
        </div>

        <div class="button-group">
            <button class="btn btn-primary" onclick="generateQuote()">Next Quote</button>
            <button class="btn btn-secondary" id="copy-btn" onclick="copyQuote()">Copy</button>
        </div>
    </div>

    <script src="quotes.js"></script>

    <script>
        // UI Logic
        const themeBtn = document.getElementById('theme-btn');
        const themeIcon = document.getElementById('theme-icon');
        const body = document.body;

        themeBtn.addEventListener('click', () => {
            const isDark = body.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            themeIcon.innerText = newTheme === 'dark' ? '🌙' : '☀️';
        });

        function generateQuote() {
            // Check if quotes array exists in the external file
            if (typeof quotes === 'undefined' || quotes.length === 0) {
                alert("Please ensure quotes.js is linked and contains a quotes array.");
                return;
            }

            const quoteBox = document.getElementById('quote-box');
            const textElem = document.getElementById('quote-text');
            const authorElem = document.getElementById('quote-author');
            
            // Animation reset
            quoteBox.classList.remove('fade-in');
            void quoteBox.offsetWidth; 
            quoteBox.classList.add('fade-in');

            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];

            // Handle both simple string arrays or object arrays
            const text = typeof randomQuote === 'string' ? randomQuote : randomQuote.text;
            const author = randomQuote.author || "";

            textElem.innerText = `"${text}"`;
            authorElem.innerText = author ? `— ${author}` : "";
        }

        function copyQuote() {
            const text = document.getElementById('quote-text').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copy-btn');
                btn.innerText = "Copied!";
                setTimeout(() => { btn.innerText = "Copy"; }, 1500);
            });
        }
    </script>
</body>
</html>
